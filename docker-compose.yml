version: '3.8'
services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: icfdb
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  mongo:
    image: mongo:6
    ports:
      - '27017:27017'
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    depends_on:
      - postgres
      - mongo
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/icfdb
      MONGO_URL: mongodb://mongo:27017/
      YOLO_MODEL_PATH: ''
    ports:
      - '8000:8000'

  frontend:
    build: ./frontend
    ports:
      - '3000:80'

volumes:
  pgdata:
  mongodata:
